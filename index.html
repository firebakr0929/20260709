<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>次世代地震測報 — 互動式儀表板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="particles" id="particles"></div>

  <header class="hero">
    <div class="hero-content">
      <div class="seismic-wave" id="seismicWave">
        <svg viewBox="0 0 800 120" preserveAspectRatio="none">
          <path id="wavePath" d="M0,60 C100,10 200,110 300,60 C400,10 500,110 600,60 C700,10 800,60 800,60 L800,120 L0,120 Z" fill="rgba(255,107,53,0.15)"/>
          <path id="waveLine" d="M0,60 C100,10 200,110 300,60 C400,10 500,110 600,60 C700,10 800,60" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.6"/>
        </svg>
      </div>
      <h1 class="glitch" data-text="次世代地震測報">次世代地震測報</h1>
      <p class="subtitle">AI 代理群與大型語言模型之整合與應用</p>
      <div class="status-bar">
        <div class="status-item">
          <span class="status-dot live"></span>
          <span>即時監測 <strong id="liveStatus">運作中</strong></span>
        </div>
        <div class="status-item">
          <span> stations: <strong id="stationCount">0</strong></span>
        </div>
        <div class="status-item">
          <span>最近事件: <strong id="lastEvent">-</strong></span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="dashboard">
      <div class="card interactive-card earthquake-card" id="quakeCard">
        <h2>震波模擬器</h2>
        <canvas id="quakeCanvas" width="700" height="300"></canvas>
        <div class="card-controls">
          <button class="btn" id="triggerQuake">觸發地震</button>
          <div class="slider-group">
            <label>規模: <span id="magValue">6.0</span></label>
            <input type="range" id="magnitude" min="1" max="9" step="0.1" value="6.0">
          </div>
        </div>
      </div>

      <div class="card interactive-card">
        <h2>簡報資源</h2>
        <div class="presentation-list">
          <a href="./2026_0603_AI%20%E4%BB%A3%E7%90%86%E7%BE%A4%E8%88%87%E5%A4%A7%E5%9E%8B%E8%AA%9E%E8%A8%80%E6%A8%A1%E5%9E%8B%E5%9C%A8%E6%AC%A1%E4%B8%96%E4%BB%A3%E5%9C%B0%E9%9C%87%E6%B8%AC%E5%A0%B1%E4%B9%8B%E6%95%B4%E5%90%88%E8%88%87%E6%80%A7%E7%94%A8.md" class="pres-card" target="_blank">
            <div class="pres-icon">🤖</div>
            <div class="pres-info">
              <h3>AI 代理群與大型語言模型</h3>
              <span class="pres-date">2026 / 06 / 03</span>
              <p>臺大資訊工程學系演講</p>
            </div>
          </a>
          <a href="./2026_0612_%E7%BE%A9%E7%90%86%E5%9C%B0%E6%96%B9%E9%98%B2%E7%81%BD-%E8%87%BA%E7%81%A3%E5%9C%B0%E9%9C%87%E9%81%A0%E6%97%A9%E8%AD%A6%E7%B3%BB%E7%B5%B1%E7%9A%84%E6%BC%94%E9%80%B2%E8%88%87%E6%9C%AA%E4%BE%86.md" class="pres-card" target="_blank">
            <div class="pres-icon">🌊</div>
            <div class="pres-info">
              <h3>地震預警系統之演進與未來</h3>
              <span class="pres-date">2026 / 06 / 12</span>
              <p>義理防災講習</p>
            </div>
          </a>
        </div>
      </div>
    </section>

    <section class="dashboard">
      <div class="card">
        <h2>系統架構</h2>
        <div class="arch-grid">
          <div class="arch-item" style="--i:0">
            <div class="arch-icon">📡</div>
            <h3>觀測網</h3>
            <p>地震站即時資料串流</p>
          </div>
          <div class="arch-arrow">→</div>
          <div class="arch-item" style="--i:1">
            <div class="arch-icon">🧠</div>
            <h3>AI 代理</h3>
            <p>LLM 驅動分析決策</p>
          </div>
          <div class="arch-arrow">→</div>
          <div class="arch-item" style="--i:2">
            <div class="arch-icon">📢</div>
            <h3>預警發布</h3>
            <p>多管道即時通報</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 交通部中央氣象署地震測報中心</p>
    <p class="footer-note">本網站為互動式展示，實際數據請參考官方公告</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
